<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <meta name="description" content="Enhance and upscale your images 4× with AI (REAL-ESRGAN)." />
  <title>PixUp — AI Image Upscaler</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PixUp" />

  <link rel="stylesheet" href="styles.css" />
  <script>
    // Must run before script.js so the override is picked up
    window.BACKEND_BASE = localStorage.getItem('BACKEND_BASE');
  </script>
</head>
<body>
  <div class="bg-orbs" aria-hidden="true"></div>

  <main class="container">
    <header class="header">
      <div class="brand">
        <span class="brand-badge" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>
        </span>
        <h1>PixUp</h1>
      </div>
      <p class="subtitle">AI-powered image upscaler · enhance 4×</p>
      <button id="installBtn" class="install-btn hidden" type="button">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
        Install app
      </button>
    </header>

    <div id="warningBanner" class="warning-banner hidden">
      <strong>Heads up:</strong> <span id="warningMessage"></span>
    </div>

    <div class="card">
      <label class="section-label">Upload image</label>

      <div class="model-selector" style="display: none;">
        <label for="modelSelect" class="model-label">Select model</label>
        <select id="modelSelect" class="model-select">
          <option value="ConvNext_REAL-ESRGAN.pth">ConvNext REAL-ESRGAN (4×)</option>
          <option value="REAL-ESRGAN.pth">REAL-ESRGAN (4×)</option>
        </select>
      </div>

      <div id="dropZone" class="drop-zone">
        <div class="drop-zone-content">
          <span class="drop-zone-icon" aria-hidden="true">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </span>
          <div class="drop-zone-text">
            <span class="drop-zone-title">Drop your image here</span>
            <span class="drop-zone-subtitle">or tap to browse · PNG, JPG, WebP</span>
          </div>
          <input type="file" id="fileInput" accept="image/*" class="file-input" />
        </div>
        <div id="filePreview" class="file-preview hidden"></div>
      </div>

      <div class="buttons">
        <button id="okBtn" class="btn btn-primary" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" /></svg>
          Enhance
        </button>
        <button id="cancelBtn" class="btn btn-secondary" disabled>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>
          Cancel
        </button>
        <button id="resetBtn" class="btn btn-reset hidden">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10" /><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" /></svg>
          Reset
        </button>
      </div>

      <div id="progress" class="progress hidden">
        <div class="progress-info">
          <span id="progressText">Processing…</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-bar">
          <div id="bar" class="bar" style="width: 0%"></div>
        </div>
      </div>
      <div id="status" class="status"></div>

      <div id="outputPlaceholder" class="output-placeholder">
        <span class="output-placeholder-icon" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        </span>
        <p>Your enhanced image will appear here</p>
      </div>

      <!-- Interactive before/after comparison -->
      <div id="comparison" class="comparison hidden">
        <!-- Base layer = enhanced result (shown to the RIGHT of the divider) -->
        <img id="preview" class="compare-base" alt="Output preview" />
        <!-- Reveal layer = original (shown to the LEFT of the divider) -->
        <div class="compare-reveal">
          <img id="beforeImg" class="compare-reveal-img" alt="Original" />
        </div>
        <span class="compare-tag compare-tag-before">Before</span>
        <span class="compare-tag compare-tag-after">After</span>
        <div id="compareHandle" class="compare-handle" role="slider" aria-label="Compare before and after" tabindex="0">
          <span class="compare-grip" aria-hidden="true">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/><polyline points="9 18 3 12 9 6" transform="translate(12 0)"/></svg>
          </span>
        </div>
      </div>

      <a id="downloadLink" class="btn btn-download hidden" href="#" download>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></svg>
        Download result
      </a>
    </div>

    <footer class="footer">
      Powered by REAL-ESRGAN
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
