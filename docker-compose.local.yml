# Local / development stack — HTTP only, no SSL, no domain.
# Start with: scripts/deploy-local.sh
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/model:/app/backend/model:ro
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      # In local mode the frontend talks to the backend on localhost:8000
      - FRONTEND_BACKEND_URL=http://localhost:8000
      # Allow the local frontend origin (Nginx serves it on port 80)
      - BACKEND_CORS_ALLOWED_ORIGINS=["http://localhost","http://127.0.0.1","http://localhost:8000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped
