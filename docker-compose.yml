services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Bind to localhost only. The backend is reached publicly via the Nginx
      # HTTPS proxy (/api); this blocks direct external access to :8000 (Docker
      # would otherwise publish 0.0.0.0:8000 and bypass ufw). Host-side health
      # checks (curl localhost:8000) still work.
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/data:/app/backend/data
      - ./backend/model:/app/backend/model:ro
      - ./config.json:/app/config.json:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      # curl is not present in python:3.10-slim; use stdlib urllib instead
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
    restart: unless-stopped
